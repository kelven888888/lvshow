<div class="x-body" >

            <thead>

                <th>ID</th>

                <th>可用资金</th>

                <th>操作</th>
            </tr>

                <td>{{.Id}}</td>

                <th>{{.LockFunds}}</th>

                <td class="td-manage">

                没有数据
            </td></tr>
            {{end}}
            </tbody>
        </table>


        <div id="page"></div>
    </div>
</div>
<script>


    // 批量删除提交
    function del_all() {
        top.layer.confirm('确认要删除吗？', function(index) {
            var ids = get_list_ids('all-x-select');
            // 发异步删除数据
            ajax_post({{urlfor "admin.OrdersController.DeleteBatch"}}, {ids: ids}, reload_page);
        });
    }

    /*-删除*/
    function role_del(obj, id) {

        parent.layer.confirm('确认要删除吗？', function(index) {
            $(obj).parents("tr").remove();

            // 发异步删除数据
            ajax_post({{urlfor "admin.RoleController.Delete"}}, {id: id}, reload_page);
        });
    }
</script>
<script>
    window.onload = function () {
        layui.use(['element', 'layer', 'laydate', 'laypage', 'form'], function() {
            var $ = layui.jquery;        // jquery
            var laydate = layui.laydate; // 日期插件
            var lement = layui.element;  // 面包导航
            var layer = layui.layer;     // 弹出层
            var laypage = layui.laypage; // 分页


            // 分页
            laypage.render({
                elem: 'page',
                count: {{.Count}},
            limit: {{.Search.limit}},
            curr:  {{.Search.page}},
            prev: '<em><</em>',
                next: '<em>></em>',
                skip: false,
                jump: function (obj, first) {
                if (first != true) {
                    var query = $('.x-search-form').serialize();
                    query += "&page=" + obj.curr;

                    //  load_page({{urlfor "admin.RoleController.Index"}} + "?" + query,"son");
                    window.location.href={{urlfor "admin.AccountFundsController.Index"}} + "?" + query
                    //layui.admin.tabsBody(layui.admin.tabsPage.index).find(".layadmin-iframe")
                    // layui.admin.url .tabsBodyChange({{urlfor "admin.RoleController.Index"}} + "?" + query)
                }
            }
        });

            laydate.render({
                elem: '#date-range'
                ,range: true
                ,done: function(value, date, endDate) {
                    var dates = value.split(" - "); //得到日期生成的值，如：2017-08-18
                    $("input[name='st']") .val(dates[0]);
                    $("input[name='et']") .val(dates[1]);
                }
            });
        });

        $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.AccountFundsController.Index"}} + '?' + query);
        });
    }


</script>



{{end}}
