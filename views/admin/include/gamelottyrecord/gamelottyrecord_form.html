
{{define "main"}}

	<div class="x-body">
		<form class="layui-form">
	    <div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>用户名称</label>
				<div class="layui-input-block">
					<input type="text" id="user_name" name="user_name" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.UserName}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>产品id</label>
				<div class="layui-input-block">
					<input type="text" id="goods_id" name="goods_id" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.GoodsId}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>产品类型</label>
				<div class="layui-input-block">
					<input type="text" id="goods_type" name="goods_type" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.GoodsType}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>用户id</label>
				<div class="layui-input-block">
					<input type="text" id="user_id" name="user_id" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.UserId}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>玩法id</label>
				<div class="layui-input-block">
					<input type="text" id="play_id" name="play_id" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.PlayId}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>玩法名称</label>
				<div class="layui-input-block">
					<input type="text" id="play_name" name="play_name" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.PlayName}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>备注</label>
				<div class="layui-input-block">
					<input type="text" id="remark" name="remark" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Remark}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>商品奖励类型</label>
				<div class="layui-input-block">
					<input type="text" id="reward_type" name="reward_type" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.RewardType}}">
				</div>
			</div>



			<div class="layui-form-item">
				<input type="hidden" id="id" name="id" value="{{.result.Id}}">
				<button  class="layui-btn" lay-filter="save" lay-submit="">
					保存
				</button>
			</div>
		</form>
	</div>
		<script>
		window.onload = function() {
			layui.use(['form', 'layer', 'upload'], function() {
				$ = layui.jquery;

				var form = layui.form
					,layer = layui.layer;
  
				
				// 监听提交
				form.on('submit(save)', function(data) {
					ajax_post("{{.PostUrl}}", data.field, load_page, true, true, true);
					return false;
				});
			}); $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.BannerController.Index"}} + '?' + query);
        });
		}
	</script>

</body>
{{end}}
