
{{define "main"}}

	<div class="x-body">
		<form class="layui-form">
	    <div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>会员ID</label>
				<div class="layui-input-block">
					<input type="text" id="user_id" name="user_id" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.UserId}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>订单号</label>
				<div class="layui-input-block">
					<input type="text" id="order_sn" name="order_sn" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.OrderSn}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>状态</label>
	<div class="layui-input-inline">
		<select name="status" lay-verify="required" lay-search="">
			{{if .IsUpdate}}
			<option value="0" {{if eqpoint 0 .result.Status}}selected{{end}}>待发货</option>
			<option value="2" {{if eqpoint 2 .result.Status}}selected{{end}}>已发货</option>
			<option value="3" {{if eqpoint 3 .result.Status}}selected{{end}}>已完成</option>
			{{else}}
			<option value="0" selected>待发货</option>
			<option value="2" >已发货</option>
			<option value="3" >已完成</option>
			{{end}}
<!--			<option value="4" {{if eq 1 .agent.Status}}selected{{end}}>已完成</option>-->
		</select>
	</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>收货人姓名</label>
				<div class="layui-input-block">
					<input type="text" id="receiver_name" name="receiver_name" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.ReceiverName}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>收货人电话</label>
				<div class="layui-input-block">
					<input type="text" id="receiver_phone" name="receiver_phone" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.ReceiverPhone}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>收货地址</label>
				<div class="layui-input-block">
					<input type="text" id="receiver_address" name="receiver_address" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.ReceiverAddress}}">
				</div>
			</div>
			<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>邮编</label>
				<div class="layui-input-block">
					<input type="text" id="postal_code" name="postal_code" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.PostalCode}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>总数量</label>
				<div class="layui-input-block">
					<input type="text" id="total_qty" name="total_qty" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.TotalQty}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>产品种类</label>
				<div class="layui-input-block">
					<input type="text" id="total_product_qty" name="total_product_qty" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.TotalProductQty}}">
				</div>
			</div>

			<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>备注</label>
				<div class="layui-input-block">
					<input type="text" id="remarks" name="remarks"  autocomplete="off" class="layui-input" value="{{.result.Remarks}}">
				</div>
			</div>


			<div class="layui-form-item">
				<input type="hidden" id="id" name="id" value="{{.result.Id}}">
				<button  class="layui-btn" lay-filter="save" lay-submit="">
					保存
				</button>
			</div>
		</form>
	</div>
		<script>
		window.onload = function() {
			layui.use(['form', 'layer', 'upload'], function() {
				$ = layui.jquery;

				var form = layui.form
					,layer = layui.layer;
  
				
				// 监听提交
				form.on('submit(save)', function(data) {
					ajax_post("{{.PostUrl}}", data.field, load_page, true, true, true);
					return false;
				});
			}); $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.BannerController.Index"}} + '?' + query);
        });
		}
	</script>

</body>
{{end}}
