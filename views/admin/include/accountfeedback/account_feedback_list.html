{{define "main"}}
<style type="text/css">
  .fix-table{table-layout: fixed;}
  .fix-table td {white-space: nowrap; /* 自适应宽度*/overflow:hidden;text-overflow:ellipsis;/*省略号显示*/}
</style>
<div class="layui-card">
  <!--        <div class="layui-card-header">理财订单</div>-->
  <div class="layui-card-body">
    <table class="layui-table">
      <colgroup>

      </colgroup>
      <thead>
      <tr>
        <th>ID</th>
        <th>创建时间</th>
        <th>用户名</th>
        <th>名称</th>
        <th>邮箱</th>
        <td>图片</td>
        <td>内容</td>
        <td>操作</td>
      </tr>
      </thead>
      <tbody>
      {{range $value := .list}}
      <tr>
        <td>{{$value.Id}}</td>
        <td>{{Formatdatetime $value.CreateTime}}</td>
        <td>{{$value.Username}}</td>
        <td>{{$value.Name}}</td>
        <td>{{$value.Email}}</td>
        <td>
            <button type="button" class="layui-btn layui-btn-primary" lay-on="photots" images='{{$value.ImageUrl}}'>图片</button>
        </td>
        <td>{{$value.Content}}</td>
        <td>
          <div class="layui-btn-container">
            <button data="{{$value.Id}}" lay-on="delete" class="layui-btn layui-btn-danger">删除</button>
          </div>
        </td>
      </tr>
      {{end}}
      </tbody>
    </table>
    <div id="page"></div>
  </div>
</div>
<!--</div>-->
<script>
  window.onload = function () {
    layui.use(['element', 'layer', 'laydate', 'laypage', 'form', 'util'], function() {
      var $ = layui.jquery;        // jquery
      var laypage = layui.laypage; // 分页
      var layer = layui.layer;
      var form = layui.form;
      var util = layui.util
      console.log(layui)
      // 分页
      laypage.render({
        elem: 'page',
        count: {{.req.Count}},
        limit: {{.req.Limit}},
        curr:  {{.req.Page}},
        prev: '<em><</em>',
        next: '<em>></em>',
        skip: false,
        jump: function (obj, first) {
          if (first != true) {
            var query = $('.x-search-form').serialize();
            query += "&page=" + obj.curr;

            //  load_page({{urlfor "admin.RoleController.Index"}} + "?" + query,"son");
            window.location.href={{urlfor "admin.AccountFeedbackController.List"}} + "?" + query
            //layui.admin.tabsBody(layui.admin.tabsPage.index).find(".layadmin-iframe")
            // layui.admin.url .tabsBodyChange({{urlfor "admin.RoleController.Index"}} + "?" + query)
          }
        }
      })

      util.event('lay-on', {
        photots: function(obj) {
          console.log($(obj).attr("images"))
          let images = JSON.parse($(obj).attr("images"));
          let imagesObj = [];
          for (const image of images) {
            imagesObj.push({
              "alt": "layer",
              "pid": 1,
              "src": "{{.webApiUrl}}"+image,
            })
          }
          console.log(imagesObj)
          layer.photos({
            photos: {
              "title": "Photos Demo",
              "start": 0,
              "data": imagesObj
            }
          });
        },
        delete: function(obj) {
          let id = $(obj).attr("data")
          layer.confirm('确认要删除吗？', function(index) {
            // 发异步删除数据
            ajax_post_by_fn({{urlfor "admin.AccountFeedbackController.Delete"}}, {id: id}, false, true, false, true, function (res) {
              console.log(res)
              if (res.code == 200){
                $(obj).parents("tr").remove();
              }
            });
          });
        }
      })
    })
  }

</script>
{{end}}
