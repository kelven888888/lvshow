<script>

	// 创建编辑器
	KindEditor.ready(function (K) {
		{{range .language}}
		//var editor="editor_{{.Code}}"
		editor = K.create("#describe_{{.Code}}", {
			designMode: true,
			width:'800px',
			height:'200px',
			resizeType:0,
			uploadJson: '../../public/uploadeditor', // 上传文件的服务器端处理程序
			fileManagerJson: '../../public/uploadeditor', // 文件管理器的服务器端处理程序
			allowFileManager: true, // 允许通过文件管理器查看服务器上的文件
		});
		editor.html({{language .Code $.result.GoodsContent}});

		{{end}}
	});


</script>
<script>
	window.onload = function() {
		layui.use(['form', 'layer', 'upload','layedit'], function() {
			$ = layui.jquery;

			var form = layui.form
					,layer = layui.layer,layedit =layui.layedit;
				layui.upload.render({
					elem: '#upimg',
					field: 'file',
					url: {{urlfor "PublicController.Upload?type=banner"}},
				done: function(res) { //上传成功后的回调
					if (res.code == 200) {
						$('#LAY_upload').attr('src',"../../"+ res.data.url);
						$('#upload_cover').val(res.data.url);
					} else {
						layer.msg(res.msg, {icon: 3});
					}
				}
			});
				
				// 监听提交
				form.on('submit(save)', function(data) {
					let params = {};
					let paramsde = {};
					$("textarea[name='describe']").each(function(index, value){


						var key=value.id.replace("describe_","")
						html=KindEditor.instances[index].html()
						//	console.log(html)

						//	console.log("editor_"+key,val)
						paramsde[key] = html;


					})


					$("input[id='goods_name']").each(function(index, value){

						//alert($(this).val())
						params[value.name] = value.value;


					})
					var jsonData = JSON.stringify(params);
					data.field.goods_name =jsonData
					var jsonDatade = JSON.stringify(paramsde);
					data.field.goods_content=jsonDatade;
					ajax_post("{{.PostUrl}}", data.field, load_page, true, true, true);
					return false;
				});
			});
			$("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.BannerController.Index"}} + '?' + query);
        });
		}
	</script>

</body>
