
{{define "main"}}

	<div class="x-body">
		<form class="layui-form">
	    <div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>所属类别</label>


			<div class="layui-input-block">
			<select name="cid" lay-verify="required" lay-search="">
				<option value="0">顶级分类</option>
				{{Str2html .category}}
			</select>
			</div>
		</div>

<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>规格名称</label>
				<div class="layui-input-block">
					<input type="text" id="name" name="name" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Name}}">
				</div>
			</div>



			<div class="layui-form-item">
				<input type="hidden" id="id" name="id" value="{{.result.Id}}">
				<button  class="layui-btn" lay-filter="save" lay-submit="">
					保存
				</button>
			</div>
		</form>
	</div>
		<script>
		window.onload = function() {
			layui.use(['form', 'layer', 'upload'], function() {
				$ = layui.jquery;

				var form = layui.form
					,layer = layui.layer;
  
				
				// 监听提交
				form.on('submit(save)', function(data) {

					ajax_post("{{.PostUrl}}", data.field, load_page, true, true, true);
					return false;
				});
			}); $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.BannerController.Index"}} + '?' + query);
        });
		}
	</script>

</body>
{{end}}
