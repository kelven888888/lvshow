
{{define "main"}}

	<div class="x-body">
		<form class="layui-form">
	    <div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>券码</label>
				<div class="layui-input-block">
					<input type="text" id="coupon_code" name="coupon_code" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.CouponCode}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>状态</label>
				<div class="layui-input-block">
					<input type="text" id="status" name="status" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Status}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>价值</label>
				<div class="layui-input-block">
					<input type="text" id="price" name="price" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Price}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>优惠券id</label>
				<div class="layui-input-block">
					<input type="text" id="coupon_id" name="coupon_id" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.CouponId}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>用户id</label>
				<div class="layui-input-block">
					<input type="text" id="uid" name="uid" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Uid}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>券码</label>
				<div class="layui-input-block">
					<input type="text" id="coupon_title" name="coupon_title" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.CouponTitle}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>用户</label>
				<div class="layui-input-block">
					<input type="text" id="username" name="username" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Username}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>失效时间</label>
				<div class="layui-input-block">
					<input type="text" id="exp_date" name="exp_date" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.ExpDate}}">
				</div>
			</div>



			<div class="layui-form-item">
				<input type="hidden" id="id" name="id" value="{{.result.Id}}">
				<button  class="layui-btn" lay-filter="save" lay-submit="">
					保存
				</button>
			</div>
		</form>
	</div>
		<script>
		window.onload = function() {
			layui.use(['form', 'layer', 'upload'], function() {
				$ = layui.jquery;

				var form = layui.form
					,layer = layui.layer;
  
				
				// 监听提交
				form.on('submit(save)', function(data) {
					ajax_post("{{.PostUrl}}", data.field, load_page, true, true, true);
					return false;
				});
			}); $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.BannerController.Index"}} + '?' + query);
        });
		}
	</script>

</body>
{{end}}
