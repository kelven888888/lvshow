{{define "main"}}
<form class="layui-form x-center x-search-form" style="width:80%">
    <div class="layui-form-pane" style="margin-top: 15px;">
        <div class="layui-form-item">
            <!--          <label class="layui-form-label">日期范围</label>-->
            <!--          <div class="layui-input-inline">-->
            <!--            <input type="text" class="layui-input" id="date-range" value="{{.Search.st}} - {{.Search.et}}">-->
            <!--            <input type="hidden" class="layui-input" name="st" value="{{.Search.st}}">-->
            <!--            <input type="hidden" class="layui-input" name="et" value="{{.Search.et}}">-->
            <!--          </div>-->
            <div class="layui-inline">
                <label class="layui-form-label">用户名</label>
                <div class="layui-input-inline">
                    <input type="text" name="username" placeholder="请输入用户名" autocomplete="off" class="layui-input" value="{{.req.Username}}">
                </div>
            </div>
            <div class="layui-inline"> <label class="layui-form-label">状态</label>
                <div class="layui-input-inline">
                    <select name="handler" lay-verify="required" lay-search="">
                        <option value="">直接选择或搜索选择</option>
                        <option value="true" {{if eq "true" .req.Handler}}selected{{end}}>已处理</option>
                        <option value="false"  {{if eq "false" .req.Handler}}selected{{end}}>未处理</option>
                    </select>
                </div>
            </div>
            <div class="layui-inline">
                <div class="layui-input-inline" style="width:80px">
                    <button type="button" class="layui-btn" id="btn-search"><i class="layui-icon">&#xe615;</i></button>
                </div>
            </div>
        </div>
    </div>
</form>
<div class="layui-card">
    <!--        <div class="layui-card-header">理财订单</div>-->
    <div class="layui-card-body">
        <table class="layui-table">
            <colgroup>
            </colgroup>
            <thead>
            <tr>
                <th>用户名</th>
                <th>开始时间</th>
                <th>最后时间</th>
                <th>累计天数</th>
                <th>累计金额</th>
                <th>是否已处理</th>
            </tr>
            </thead>
            <tbody>
            {{range $value := .list}}
            <tr >
                <td>{{$value.Username}}</td>
                <td>{{StrP2FormatYMD $value.StartDate}}</td>
                <td>{{StrP2FormatYMD $value.LastDate}}</td>
                <td>{{$value.Days}}</td>
                <td>{{$value.AccumulativeTotal}}</td>
                <td>
                    {{if $value.Handler}}
                    已处理
                    {{else}}
                    未处理
                    {{end}}
                </td>
            </tr>
            {{end}}
            </tbody>
        </table>
        <div id="page"></div>
    </div>
</div>
<!--</div>-->
<script>
    window.onload = function () {
        layui.use(['element', 'layer', 'laydate', 'laypage', 'form', 'util'], function() {
            var $ = layui.jquery;        // jquery
            var laypage = layui.laypage; // 分页
            var layer = layui.layer;
            var form = layui.form;
            var util = layui.util
            // 分页
            laypage.render({
                elem: 'page',
                count: {{.req.Count}},
            limit: {{.req.Limit}},
            curr:  {{.req.Page}},
            prev: '<em><</em>',
                next: '<em>></em>',
                skip: false,
                jump: function (obj, first) {
                if (first != true) {
                    var query = $('.x-search-form').serialize();
                    query += "&page=" + obj.curr;

                    //  load_page({{urlfor "admin.RoleController.Index"}} + "?" + query,"son");
                    window.location.href={{urlfor "admin.RewardController.UserFunds"}} + "?" + query
                    //layui.admin.tabsBody(layui.admin.tabsPage.index).find(".layadmin-iframe")
                    // layui.admin.url .tabsBodyChange({{urlfor "admin.RoleController.Index"}} + "?" + query)
                }
            }
        })

            $("#btn-search").click(() =>{
                var query = $('.x-search-form').serialize();
                console.log(query)
                load_page({{urlfor "admin.RewardController.UserFunds"}} + '?' + query);
            })

        })
    }

</script>
{{end}}
