
{{define "main"}}

	<div class="x-body">
		<form class="layui-form">
	    <div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>出售会员ID</label>
				<div class="layui-input-block">
					<input type="text" id="user_id_sell" name="user_id_sell" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.UserIdSell}}">
				</div>
			</div>
			<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>出售用户</label>
				<div class="layui-input-block">
					<input type="text" id="user_name_sell" name="user_name_sell" autocomplete="off" class="layui-input" value="{{.result.UserNameSell}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>购买会员ID</label>
				<div class="layui-input-block">
					<input type="text" id="user_id_buy" name="user_id_buy" autocomplete="off" class="layui-input" value="{{.result.UserIdBuy}}">
				</div>
			</div>
			<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>购买用户</label>
				<div class="layui-input-block">
					<input type="text" id="user_name_buy" name="user_name_buy" autocomplete="off" class="layui-input" value="{{.result.UserNameBuy}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>订单号</label>
				<div class="layui-input-block">
					<input type="text" id="order_sn" name="order_sn" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.OrderSn}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>总价</label>
				<div class="layui-input-block">
					<input type="text" id="total_amount" name="total_amount" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.TotalAmount}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>支付金额</label>
				<div class="layui-input-block">
					<input type="text" id="pay_amount" name="pay_amount" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.PayAmount}}">
				</div>
			</div>
			<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>状态</label>
				<div class="layui-input-inline">
					<select name="status" lay-verify="required" lay-search="">
						<option value="0" {{if eqpoint 0 .result.Status}}selected{{end}}>待成交</option>
						<option value="1" {{if eqpoint 1 .result.Status}}selected{{end}}>已付款</option>
<!--						<option value="2" {{if eqpoint 2 .result.Status}}selected{{end}}>已发货</option>-->
						<option value="3" {{if eqpoint 3 .result.Status}}selected{{end}}>已完成</option>
									<option value="4" {{if eq 4 .agent.Status}}selected{{end}}>已取消</option>
					</select>
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>成交时间</label>
				<div class="layui-input-block">
					<input type="text" id="pay_time" name="pay_time" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.PayTime}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>用户名</label>
				<div class="layui-input-block">
					<input type="text" id="order_type" name="order_type" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.OrderType}}">
				</div>
			</div>



			<div class="layui-form-item">
				<input type="hidden" id="id" name="id" value="{{.result.Id}}">
				<button  class="layui-btn" lay-filter="save" lay-submit="">
					保存
				</button>
			</div>
		</form>
	</div>
		<script>
		window.onload = function() {
			layui.use(['form', 'layer', 'upload'], function() {
				$ = layui.jquery;

				var form = layui.form
					,layer = layui.layer;
  
				
				// 监听提交
				form.on('submit(save)', function(data) {
					ajax_post("{{.PostUrl}}", data.field, load_page, true, true, true);
					return false;
				});
			}); $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.BannerController.Index"}} + '?' + query);
        });
		}
	</script>

</body>
{{end}}
