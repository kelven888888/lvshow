{{define "main"}}
<style type="text/css">
    .fix-table{table-layout: fixed;}
    .fix-table td {white-space: nowrap; /* 自适应宽度*/overflow:hidden;text-overflow:ellipsis;/*省略号显示*/}
</style>
<form class="layui-form x-center x-search-form" style="width:80%">
    <div class="layui-form-pane" style="margin-top: 15px;">
        <div class="layui-form-item">
            <div class="layui-inline"> <label class="layui-form-label">账户</label>
                <div class="layui-input-inline">
                    <input type="text" name="acc" lay-verify="required" placeholder="账户" autocomplete="off" class="layui-input" value="{{.agent.Acc}}">
                </div>
            </div>

            <div class="layui-inline">
                <div class="layui-input-inline" style="width:80px">
                    <button type="button" class="layui-btn" id="btn-search"><i class="layui-icon">&#xe615;</i></button>
                </div>
            </div>
        </div>
    </div>
</form>
<div class="layui-card">
    <div class="layui-card-body">
        <button type="button" class="layui-btn" onclick="x_admin_show('添加代理商', '{{urlfor "admin.AgentController.Edit"}}')">添加</button>
    </div>
</div>
<div class="layui-card">
    <!--        <div class="layui-card-header">理财订单</div>-->
    <div class="layui-card-body">
        <table class="layui-table">
            <colgroup>

            </colgroup>
            <thead>
            <tr>
                <th>ID</th>
                <th>账户</th>
                <th>状态</th>
                <th>直推人数</th>
                <td>操作</td>
            </tr>
            </thead>
            <tbody>
            {{range $value := .list}}
            <tr>
                <td>{{$value.Id}}</td>
                <td>{{$value.Acc}}</td>
                <td>
                    {{if eq $value.Status 1}}启用{{end}}
                    {{if eq $value.Status 0}}禁用{{end}}
                </td>
                <td>
                    {{$value.InviteCount}}
                </td>
                <td>
                    <div class="layui-btn-container">
                        <button  onclick="x_admin_show('修改代理商', '{{urlfor "admin.AgentController.EditPassword"}}?id={{$value.Id}}')" class="layui-btn">修改密码</button>
                        <button  onclick="x_admin_show('修改代理商', '{{urlfor "admin.AgentController.Edit"}}?id={{$value.Id}}')" class="layui-btn">修改信息</button>
                    </div>
                </td>
            </tr>
            {{end}}
            </tbody>
        </table>
        <div id="page"></div>
    </div>
</div>
<!--</div>-->
<script>
    window.onload = function () {
        layui.use(['element', 'layer', 'laydate', 'laypage', 'form'], function() {
            var $ = layui.jquery;        // jquery
            var laypage = layui.laypage; // 分页
            var layer = layui.layer;

            // 分页
            laypage.render({
                elem: 'page',
                count: {{.req.Count}},
                limit: {{.req.Limit}},
                curr:  {{.req.Page}},
                prev: '<em><</em>',
                next: '<em>></em>',
                skip: false,
                jump: function (obj, first) {
                if (first != true) {
                    var query = $('.x-search-form').serialize();
                    query += "&page=" + obj.curr;

                    //  load_page({{urlfor "admin.RoleController.Index"}} + "?" + query,"son");
                    window.location.href={{urlfor "admin.AgentController.List"}} + "?" + query
                    //layui.admin.tabsBody(layui.admin.tabsPage.index).find(".layadmin-iframe")
                    // layui.admin.url .tabsBodyChange({{urlfor "admin.RoleController.Index"}} + "?" + query)
                }
            }
        })

            $("#btn-search").click(() =>{
                var query = $('.x-search-form').serialize();
                console.log(query)
                load_page({{urlfor "admin.AgentController.List"}} + '?' + query);
            })

            $("#logBtn").click(() =>{
                layer.open({
                    type:1,

                })
            })
        })
    }

</script>
{{end}}
