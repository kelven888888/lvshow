{{define "main"}}

<div class="x-body" >

    <form class="layui-form">
        <input type="text" name="id" hidden value="{{.agent.Id}}">

        <div class="layui-form-item">
            <label class="layui-form-label">密码</label>
            <div class="layui-input-block">
                <input type="password" name="ag_password" lay-verify="required" placeholder="密码" autocomplete="off" class="layui-input" >
            </div>
        </div>

        <div class="layui-form-item">
            <div class="layui-input-block">
                <button type="submit" class="layui-btn" lay-submit lay-filter="save">立即提交</button>
            </div>
        </div>
    </form>

</div>
<script>
    window.onload = function () {
        layui.use(['form', 'laydate', 'util', 'upload'], function(){
            var $ = layui.jquery;        // jquery
            var form = layui.form;
            var layer = layui.layer;
            var laydate = layui.laydate;

            form.on('submit(save)', (data) => {
                let field = data.field;
                if (field.ag_password.length == 0 || field.ag_password.length < 6) {
                    layer.msg("账户密码名不能为空并且不能小于6位");
                    return false
                }
                ajax_post("{{urlfor "admin.AgentController.EditPassword"}}",field, load_page, true, false, true);
                return false;
            })
        })
    }

</script>

{{end}}
