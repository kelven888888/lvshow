{{define "main"}}
<link href="https://unpkg.com/@wangeditor/editor@latest/dist/css/style.css" rel="stylesheet">

<div class="x-body" >

    <form class="layui-form">
        <input type="text" name="id" hidden value="{{.news.Id}}">
        <div class="layui-form-item">
            <label class="layui-form-label">新闻标题</label>
            <div class="layui-input-block">
                <input type="text" name="headline" lay-verify="required" placeholder="标题" autocomplete="off" class="layui-input" value="{{.news.Headline}}">
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">分类</label>
            <div class="layui-input-block">
                <select name="category" lay-verify="required" lay-search="">
                    <option value="">直接选择或搜索选择</option>
                    <option value="PressReleases" {{if eq "PressReleases" .news.Category}}selected{{end}}>快讯</option>
                    <option value="CompanyNews"  {{if eq "CompanyNews" .news.Category}}selected{{end}}>公司</option>
                    <option value="MarketNews"  {{if eq "MarketNews" .news.Category}}selected{{end}}>市场</option>

                </select>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">语言</label>
            <div class="layui-input-inline">
                <div class="layui-col-md6">
                    <select name="language">
                        <option value="">请选择</option>
                        {{range $k,$v := .language}}
                        <option value="{{$v.Code}}" {{if eq $.news.Language $v.Code }} selected {{end}}>{{$v.Name}}</option>
                        {{end}}
                    </select>
                </div>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">发布时间</label>
            <div class="layui-input-block">
                <input type="text" name="datetime" lay-verify="required" placeholder="发布时间" autocomplete="off" class="layui-input" id="ID-laydate-type-datetime" {{if .news.Datetime}} value="{{ts2TimeDate .news.Datetime}}" {{end}} >
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">是否显示</label>
            <div class="layui-input-block">
                <input type="checkbox" name="show" lay-skin="switch" lay-filter="switchTest"  {{if .news.Show}}checked{{end}}>
            </div>
        </div>
        <div class="layui-form-item">
            <label class="layui-form-label">图片</label>
            <div class="layui-input-block">
                <img id="LAY_upload" width="150"
                     {{if .news.Image}}
                     src="../../{{.news.Image}}"
                     {{end}}
                >
                <input type="hidden" id="upload_cover" name="image" {{if .news.Image}} value="{{.news.Image}}" {{end}}>

                <div class="layui-input-inline">
                    <div class="site-demo-upbar">
                        <button type="button" class="layui-btn layui-btn-primary" id="upimg">
                            <i class="layui-icon">&#xe67c;</i>上传图片
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">简要</label>
            <div class="layui-input-block">
                <textarea name="summary" class="layui-textarea" placeholder="简要" >
                    {{if .news.Summary}} {{.news.Summary}} {{end}}
                </textarea>
            </div>
        </div>

        <div class="layui-form-item">
            <label class="layui-form-label">内容</label>
            <div id="content-editor" class="layui-input-block">
                <div id="content-toolbar-container"><!-- 工具栏 --></div>
                <div id="content-editor-container"><!-- 编辑器 --></div>
            </div>
        </div>

        <div class="layui-form-item">
            <div class="layui-input-block">
                <button type="submit" class="layui-btn" lay-submit lay-filter="save">立即提交</button>
            </div>
        </div>
    </form>

</div>
<script src="https://unpkg.com/@wangeditor/editor@latest/dist/index.js"></script>
<script>
    window.onload = function () {
        layui.use(['form', 'laydate', 'util', 'upload'], function(){
            var $ = layui.jquery;        // jquery
            var form = layui.form;
            var layer = layui.layer;
            var laydate = layui.laydate;

            const { createEditor, createToolbar } = window.wangEditor

            const editorConfig = {
                placeholder: 'Type here...',
                onChange(editor) {
                    const html = editor.getHtml()
                    console.log('editor content', html)
                    // 也可以同步到 <textarea>
                },
                MENU_CONF: {}
            }

            editorConfig.MENU_CONF['uploadImage'] = {
                server: '{{urlfor "PublicController.Upload?type=news"}}',
                fieldName: 'file',
                customInsert: function(res, insertFn) {
                    const url = window.location.protocol + "//" +window.location.host + "/" + res.data.url
                    console.log(url)
                    insertFn(url, "", url)
                }
            }

            const toolbarConfig = {}

            const contentEditor = createEditor({
                selector: "#content-editor-container",
                html: '{{.news.Content}}',
                config: editorConfig,
                mode: 'default'
            })

            const contentToolbar = createToolbar({
                editor: contentEditor,
                selector: '#content-toolbar-container',
                config: toolbarConfig,
                mode: 'default', // or 'simple'
            })

            laydate.render({
                elem: '#ID-laydate-type-datetime',
                type: 'datetime',
                format: 'yyyy-MM-dd HH:mm:ss'
            });

            //图片上传接口
            layui.upload.render({
                elem: '#upimg',
                field: 'file',
                url: {{urlfor "PublicController.Upload?type=news"}},
                done: function(res) { //上传成功后的回调
                    if (res.code == 200) {
                        $('#LAY_upload').attr('src',"../../"+ res.data.url);
                        $('#upload_cover').val(res.data.url);
                    } else {
                        layer.msg(res.msg, {icon: 3});
                    }
                }
            });

            form.on('submit(save)', (data) => {
                let field = data.field;
                field.content = contentEditor.getHtml()
                if (field.show === 'on') {
                    field.show = true
                }else {
                    field.show = false
                }
                ajax_post("{{urlfor "admin.NewsController.Edit"}}", field, load_page, true, false, true);
                return false
            })
        })
    }

</script>

{{end}}
