
{{define "main"}}

	<div class="x-body">
		<form class="layui-form">


			<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>分类</label>
				<div class="layui-input-block">
					<select name="cid" lay-verify="required" lay-search="">
						<option value=    >请选择分类</option>
						{{Str2html .category}}
					</select>		</div>
			</div>
			<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>属性组</label>
				<div class="layui-input-block">
					<select name="group_id" style="display: none !important;">
						<option value="">请选择属性组</option>
							{{Str2html .sepcgroup}}
					</select>					</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>名称</label>
				<div class="layui-input-block">
					<input type="text" id="name" name="name" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Name}}">
				</div>
			</div>
<div class="layui-form-item">
				<label class="layui-form-label">数字类型参数</label>
				<div class="layui-input-inline">
				{{if .IsUpdate}}<input type="radio" name="numeric" value="1" title="是"  {{if eqpoint .result.Numeric 1 }} checked {{end}}>
<input type="radio" name="numeric" value="2" title="否"  {{if eqpoint .result.Numeric 2 }} checked {{end}}>
{{else}}	<input type = "radio" name = "numeric" value = "1" title = "是"  checked>
	<input type = "radio" name = "numeric" value = "2" title = "否"  checked>

				{{end}}
				</div>
				</div><div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>单位</label>
				<div class="layui-input-block">
					<input type="text" id="unit" name="unit" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Unit}}">
				</div>
			</div>
<div class="layui-form-item">
				<label class="layui-form-label">sku通用属性</label>
				<div class="layui-input-inline">
				{{if .IsUpdate}}<input type="radio" name="generic" value="1" title="是"  {{if eqpoint .result.Generic 1 }} checked {{end}}>
<input type="radio" name="generic" value="2" title="否"  {{if eqpoint .result.Generic 2 }} checked {{end}}>
{{else}}	<input type = "radio" name = "generic" value = "1" title = "是"  checked>
	<input type = "radio" name = "generic" value = "2" title = "否"  checked>

				{{end}}
				</div>
				</div><div class="layui-form-item">
				<label class="layui-form-label">用于搜索过滤</label>
				<div class="layui-input-inline">
				{{if .IsUpdate}}<input type="radio" name="searching" value="1" title="是"  {{if eqpoint .result.Searching 1 }} checked {{end}}>
<input type="radio" name="searching" value="2" title="否"  {{if eqpoint .result.Searching 2 }} checked {{end}}>
{{else}}	<input type = "radio" name = "searching" value = "1" title = "是"  checked>
	<input type = "radio" name = "searching" value = "2" title = "否"  checked>

				{{end}}
				</div>
				</div><div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>数值类型参数</label>
				<div class="layui-input-block">
					<input type="text" id="segments" name="segments" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Segments}}">
				</div>
			</div>



			<div class="layui-form-item">
				<input type="hidden" id="id" name="id" value="{{.result.Id}}">
				<button  class="layui-btn" lay-filter="save" lay-submit="">
					保存
				</button>
			</div>
		</form>
	</div>
		<script>
		window.onload = function() {
			layui.use(['form', 'layer', 'upload'], function() {
				$ = layui.jquery;

				var form = layui.form
					,layer = layui.layer;
  
				
				// 监听提交
				form.on('submit(save)', function(data) {
					ajax_post("{{.PostUrl}}", data.field, load_page, true, true, true);
					return false;
				});
			}); $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.BannerController.Index"}} + '?' + query);
        });
		}
	</script>

</body>
{{end}}
