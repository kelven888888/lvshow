
{{define "main"}}

	<div class="x-body">
		<form class="layui-form">
	    <div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>老经验</label>
				<div class="layui-input-block">
					<input type="text" id="oldexp" name="oldexp" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Oldexp}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>获取经验</label>
				<div class="layui-input-block">
					<input type="text" id="exp" name="exp" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Exp}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>新经验</label>
				<div class="layui-input-block">
					<input type="text" id="newexp" name="newexp" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Newexp}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>抽奖记录id</label>
				<div class="layui-input-block">
					<input type="text" id="record_id" name="record_id" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.RecordId}}">
				</div>
			</div>



			<div class="layui-form-item">
				<input type="hidden" id="id" name="id" value="{{.result.Id}}">
				<button  class="layui-btn" lay-filter="save" lay-submit="">
					保存
				</button>
			</div>
		</form>
	</div>
		<script>
		window.onload = function() {
			layui.use(['form', 'layer', 'upload'], function() {
				$ = layui.jquery;

				var form = layui.form
					,layer = layui.layer;
  
				
				// 监听提交
				form.on('submit(save)', function(data) {
					ajax_post("{{.PostUrl}}", data.field, load_page, true, true, true);
					return false;
				});
			}); $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.BannerController.Index"}} + '?' + query);
        });
		}
	</script>

</body>
{{end}}
