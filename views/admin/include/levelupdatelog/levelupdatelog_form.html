
{{define "main"}}

	<div class="x-body">
		<form class="layui-form">
	    <div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>旧等级</label>
				<div class="layui-input-block">
					<input type="text" id="oldlevel" name="oldlevel" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Oldlevel}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>新等级</label>
				<div class="layui-input-block">
					<input type="text" id="newlevel" name="newlevel" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Newlevel}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>当前经验</label>
				<div class="layui-input-block">
					<input type="text" id="exp" name="exp" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Exp}}">
				</div>
			</div>
<div class="layui-form-item">
				<label for="title" class="layui-form-label"><span class="x-red">*</span>备注</label>
				<div class="layui-input-block">
					<input type="text" id="remark" name="remark" lay-verify="required" autocomplete="off" class="layui-input" value="{{.result.Remark}}">
				</div>
			</div>



			<div class="layui-form-item">
				<input type="hidden" id="id" name="id" value="{{.result.Id}}">
				<button  class="layui-btn" lay-filter="save" lay-submit="">
					保存
				</button>
			</div>
		</form>
	</div>
		<script>
		window.onload = function() {
			layui.use(['form', 'layer', 'upload'], function() {
				$ = layui.jquery;

				var form = layui.form
					,layer = layui.layer;
  
				
				// 监听提交
				form.on('submit(save)', function(data) {
					ajax_post("{{.PostUrl}}", data.field, load_page, true, true, true);
					return false;
				});
			}); $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.BannerController.Index"}} + '?' + query);
        });
		}
	</script>

</body>
{{end}}
