
{{define "main"}}

<body class="x-iframe-body">


<div class="x-body">
        <div class="layui-card">
         <form class="layui-form x-center x-search-form" style="width:80%">
                        <div class="layui-form-pane" style="margin-top: 15px;">
                            <div class="layui-form-item">



                                    <div class="layui-input-inline">


                                        <input type="hidden" name="play_id"  placeholder="请输入关键字" autocomplete="off" class="layui-input" value="{{.Search.play_id}}">
                                    </div>
                                </div>





<!--                                  <div class="layui-inline">-->
<!--                                                            <div class="layui-input-inline" style="width:80px">-->
<!--                                                                <button type="reset" class="layui-btn layui-btn-primary" id="reset">重置</button>-->
<!--                                                            </div>-->
<!--                                                        </div>-->
                            </div>
                        </div>

                    </form>
            <xblock>
              <xblock>


                           <span class="x-right" style="line-height:40px">共有数据：{{.Count}} 条</span>



            </xblock>
            </xblock>
            <table class="layui-table layui-form">
                <thead>
                    <tr>

                       <th style="width: 30px"><input type="checkbox" lay-skin="primary" lay-filter="all-select"></th>
                        <th>ID</th>
<th>商品名称</th>


<th>商品库存</th>
                        <th>商品单价</th>
                        <th>商品奖励类型</th>
<th>商品封面图</th>

<th>状态</th>

                       <td>操作</td>
                    </tr>
                </thead>
                <tbody id="x-img">
              {{range .List}}
                    <tr>
                        <td><input type="checkbox" lay-skin="primary" value="{{.Id}}" class="all-x-select"></td>
                        <td>{{.Id}}</td>
<td>{{language "zh-hant" .GoodsName}}</td>

<td>{{.GoodsStock}}</td>
                        <td>{{.UnitPrice}}</td>
<td>{{.RewardType}}</td>
                        <td><img src="../../{{.GoodsCover}}" width="200" οnerrοr="nofind();" /></td>
<td>
    {{if eqpoint .GoodsStatus 0}}
    <div class="layui-unselect layui-form-switch layui-checkbox-disbaled layui-disabled" lay-skin="_switch"><em>禁用</em><i></i></div>
    {{else}}
    <div class="layui-unselect layui-form-switch layui-form-onswitch layui-checkbox-disbaled layui-disabled" lay-skin="_switch"><em>启用</em><i></i></div>
    {{end}}
</td>
 <td class="td-manage">
                            <a class="layui-btn layui-btn-xs layui-btn-danger" href="javascript:;" onclick="del(this,'{{.Id}}')">
                                <i class="layui-icon">&#xe640;</i>删除
                            </a>
                        </td> </tr>
                {{end}}

                </tbody>
            </table>
            <div id="page"></div>
        </div>
	</div>
	<script>
		window.onload = function() {
			layui.use(['layer', 'form' ,'laypage', 'form'], function() {
				$ = layui.jquery; //jquery
				layer = layui.layer; //弹出层
                var laypage = layui.laypage; // 分页
                form=layui.form
                // 分页
                laypage.render({
                    elem: 'page',
                    count: {{.Count}},
                limit: {{.Search.limit}},
                curr:  {{.Search.page}},
                prev: '<em><</em>',
                    next: '<em>></em>',
                    skip: false,
                    jump: function (obj, first) {
                    if (first != true) {
                        var query = $('.x-search-form').serialize();
                        query += "&page=" + obj.curr;

                        //  load_page({{urlfor "admin.RoleController.Index"}} + "?" + query,"son");
                        window.location.href={{urlfor "admin.playsettingController.Index"}} + "?" + query
                        //layui.admin.tabsBody(layui.admin.tabsPage.index).find(".layadmin-iframe")
                        // layui.admin.url .tabsBodyChange({{urlfor "admin.RoleController.Index"}} + "?" + query)
                    }
                }
            });

				layer.ready(function() { //为了layer.ext.js加载完毕再执行
					layer.photos({
						photos: '#x-img'
						//,shift: 5 //0-6的选择，指定弹出图片动画类型，默认随机
					});
				});
			});
            $('#resetBtn').on('click', function(){
                // 使用form模块的resetField方法来重置表单
                form.resetField('myForm');
            });
		}



		// 删除
		function del(obj, id, name) {
            parent.layer.confirm('确认要删除吗？', function(index) {
				$(obj).parents("tr").remove();

				//发异步删除数据
				ajax_post({{urlfor "admin.playsettingController.DeleteProduct"}}, {id: id, name: name}, reload_page);
			});
		}
        $("#btn-search").click(function () {
            var query = $('.x-search-form').serialize();
            console.log(query)
            load_page({{urlfor "admin.playsettingController.Index"}} + '?' + query);
        });
        $("#reset").click(function () {
            load_page({{urlfor "admin.playsettingController.Index"}} + '?' );
        });

    </script>
</body>
{{end}}
